server {
  listen 443 ssl; 
  server_name website.adele.inesc-id.pt; 

  include includes/ssl.conf;  

  location / {
    proxy_pass http://adele-website-frontend:80; 
  }
}

server {
  server_name website-api.adele.inesc-id.pt; 
  include includes/ssl.conf;

  location / {
    proxy_pass http://adele-website-backend:8080; 
  }
}
