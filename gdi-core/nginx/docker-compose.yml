services:
  nginx:
    image: nginx-template:latest
    build:
      context: .
      dockerfile: ./nginx/Dockerfile_nginx_w_gomplate
    restart: unless-stopped
    networks:
      - tre-core
    ports:
      - 80:80
      - 443:443
    volumes:
      - /etc/localtime:/etc/localtime:ro
      # Scripts to autoreload Nginx and process templates
      - ./nginx/scripts:/docker-entrypoint.d/scripts/  
      # Nginx configuration templates
      - ./nginx/template_confs/:/etc/nginx/template_confs/:ro
      - ./nginx/template_includes/:/etc/nginx/template_includes/

      - ./nginx/confs_docker/:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      # commented because includes are now generated from template_includes
      #- ./nginx/includes:/etc/nginx/includes/:ro 
    depends_on:
      # s3inbox:
      #   condition: service_started
      #download:
      #  condition: service_started
      rems-app:
        condition: service_started
      adele-website-frontend:
        condition: service_started
      adele-website-backend:
        condition: service_started
      fdp-client:
        condition: service_started
      aai-mock:
        condition: service_started
    environment:
      - MOCK_AAI_DOMAIN
      - REMS_DOMAIN
      - FDP_DOMAIN
      - STORAGE_AUTH_DOMAIN
      - WEB_DOMAIN
      - WEB_API_DOMAIN
      - BACKOFFICE_DOMAIN
      - BACKOFFICE_API_DOMAIN
      - CERT_NAME
      - CERT_FILE
      - KEY_FILE
    #command: ["sleep", "1000"] # debug


  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      nginx:
        condition: service_started
    # Check validity and renew certificates every 15 hours    
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 15h & wait $${!}; done;'"


